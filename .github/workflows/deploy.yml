name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        run: npm install

      - name: 📝 Create wrangler.toml
        run: |
          cat > wrangler.toml << 'WEOF'
          name = "server-monitor-pro"
          main = "src/index.js"
          compatibility_date = "2026-05-26"
          compatibility_flags = ["nodejs_compat"]

          [triggers]
          crons = ["0 0 * * *"]

          [assets]
          directory = "./public"
          binding = "ASSETS"

          [[d1_databases]]
          binding = "DB"
          database_name = "server-monitor-db"
          database_id = "D1_PLACEHOLDER"
          WEOF

          sed -i "s|D1_PLACEHOLDER|${{ secrets.D1_DATABASE_ID }}|g" wrangler.toml

      - name: 🔐 Sync Worker Secrets (idempotent)
        run: |
          set +e
          echo "Deleting old secrets (ignore if not exists)..."
          npx wrangler secret delete API_SECRET >/dev/null 2>&1
          npx wrangler secret delete API_USER_NAME >/dev/null 2>&1
          echo "Creating secrets..."
          echo "${{ secrets.API_SECRET }}" | npx wrangler secret put API_SECRET
          echo "${{ secrets.API_USER_NAME }}" | npx wrangler secret put API_USER_NAME
          set -e
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 🚀 Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: ✅ Deployment Success
        if: success()
        run: echo "🎉 部署成功"

      - name: ❌ Deployment Failed
        if: failure()
        run: echo "💥 部署失败，请检查日志"